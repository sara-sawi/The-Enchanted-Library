<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — BookVerse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/checkout.css" />
</head>
<body>

  <!-- Nav -->
  <div class="checkout-nav">
    <a href="../pages/book-details.html" class="checkout-logo">✦ BookVerse ✦</a>
    <button class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle theme">
      <span id="themeIconCo">☀️</span>
    </button>
  </div>

  <div class="checkout-wrap">
    <div class="checkout-header">
      <h1 class="checkout-title">Checkout</h1>
      <p class="checkout-subtitle">Complete your enchanted order.</p>
    </div>

    <div id="checkoutContent">
      <!-- JS renders here -->
      <p style="text-align:center;color:rgba(247,237,216,0.3);font-style:italic">Loading order…</p>
    </div>
  </div>

  <script src="../js/checkout.js"></script>
</body>
</html>
