<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Scroll - The Enchanted Library</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/verification.css">
</head>

<body data-theme="enchanted">

    <!-- Background -->
    <div class="library-bg">
        <div class="bookshelf-layer"></div>
        <div class="vignette"></div>
    </div>
    <div class="candle-left"></div>
    <div class="candle-right"></div>
    <canvas id="particles"></canvas>

    <!-- Controls Bar: Theme + Language -->
    <div class="controls-bar">
        <div class="theme-toggle" role="group" aria-label="Switch theme">
            <button class="theme-btn active" id="btn-enchanted" onclick="setTheme('enchanted')">🌙 Enchanted</button>
            <button class="theme-btn" id="btn-reader" onclick="setTheme('reader')">☀️ Reader</button>
        </div>
        <div class="lang-toggle" role="group" aria-label="Switch language">
            <button class="lang-btn active" id="btn-lang" onclick="toggleLang()">عربي</button>
        </div>
    </div>

    <!-- Verification Card -->
    <div class="login-card" role="main">
        <p class="eyebrow" id="eyebrow">✦ Unlock Your Destiny ✦</p>
        <h1 class="card-title" id="card-title">Verify Your Scroll</h1>
        <p class="card-subtitle" id="card-subtitle">"The library sent a whisper to your scroll…"</p>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-glyph">❧</span>
            <div class="divider-line"></div>
        </div>

        <p class="intro-text" id="intro-text">Enter the 4-digit incantation we sent to your scroll to proceed.</p>

        <form id="verification-form" novalidate>
            <div class="form-group">
                <label for="code" id="code-label">Incantation Code</label>
                <input type="text" id="code" placeholder="----" autocomplete="off" maxlength="4"
                    style="text-align: center; font-size: 24px; letter-spacing: 0.5em;">
                <p class="field-error" id="code-error">The incantation is incomplete or incorrect…</p>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                📜 Verify Code
            </button>
        </form>

        <div class="card-footer">
            <button class="link-styled" id="login-btn" onclick="handleLogin()">Return to the doors.</button>
        </div>
    </div>

    <div class="epigraph" id="epigraph">"Every lost key has a door waiting for it."</div>
    <div class="toast" id="toast"></div>
    <script src="../js/global.js"></script>
    <script src="../js/verification.js"></script>

</body>

</html>
